name: ChildsupportLedger
options:
  bundleIdPrefix: com.shimondeitel.csledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ChildsupportLedger:
    type: application
    platform: iOS
    sources:
      - path: ChildsupportLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.csledger
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ChildsupportLedger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ChildsupportLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChildsupportLedgerTests
      - path: ChildsupportLedger.storekit
    dependencies:
      - target: ChildsupportLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.csledger.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ChildsupportLedgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ChildsupportLedgerUITests
    dependencies:
      - target: ChildsupportLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.csledger.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ChildsupportLedger:
    build:
      targets:
        ChildsupportLedger: all
        ChildsupportLedgerTests: [test]
        ChildsupportLedgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ChildsupportLedger.storekit
    test:
      config: Debug
      storeKitConfiguration: ChildsupportLedger.storekit
      targets:
        - ChildsupportLedgerTests
        - ChildsupportLedgerUITests
    archive:
      config: Release
